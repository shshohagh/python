{% extends "base.html" %}

{% block title %}Add New Meal - Calory Tracker{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-success text-white d-flex justify-content-between align-items-center">
                <h5 class="mb-0">Add a Meal</h5>
                <a href="/calory" class="btn btn-light btn-sm text-success fw-bold">Meal History</a>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="foodName" class="form-label fw-semibold">Food Name</label>
                        <input type="text" class="form-control" id="foodName" name="food_name"
                            placeholder="e.g. Apple, Rice, Grilled Chicken">
                    </div>
                    <div class="mb-3">
                        <label for="calories" class="form-label fw-semibold">Calories</label>
                        <input type="number" class="form-control" id="calories" name="calories" placeholder="e.g. 150">
                    </div>
                    <button type="submit" class="btn btn-success w-100 fw-bold">Add Meal</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
