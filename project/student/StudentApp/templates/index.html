<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Student App - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        .sidebar {
            min-height: calc(100vh - 56px);
            box-shadow: inset -1px 0 0 rgba(0, 0, 0, .1);
        }

        .sidebar .nav-link {
            font-weight: 500;
            color: #333;
            padding: 0.75rem 1rem;
        }

        .sidebar .nav-link.active {
            color: #0d6efd;
            background-color: #f8f9fa;
        }

        .sidebar .nav-link:hover {
            background-color: #e9ecef;
        }
    </style>
</head>

<body>
    <!-- Top Header Navbar -->
    <header class="navbar navbar-dark sticky-top bg-dark flex-nowrap p-0 shadow">
        <div class="d-flex align-items-center" style="width: 250px; flex-shrink: 0;">
            <button class="navbar-toggler ms-3 border-0" type="button" data-bs-toggle="collapse"
                data-bs-target="#sidebarMenu" aria-controls="sidebarMenu" aria-expanded="true"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <a class="navbar-brand px-3 fs-6" href="#">StudentApp</a>
        </div>
        <div class="navbar-nav w-100 d-flex flex-row justify-content-end px-3">
            <div class="nav-item text-nowrap">
                <a class="nav-link px-3" href="#">Sign out</a>
            </div>
        </div>
    </header>

    <div class="container-fluid p-0">
        <div class="d-flex flex-nowrap">
            <!-- Left Sidebar -->
            <nav id="sidebarMenu" class="bg-light sidebar collapse show" style="width: 250px; flex-shrink: 0;">
                <div class="position-sticky pt-3 sidebar-sticky">
                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a class="nav-link active" aria-current="page" href="#">
                                Dashboard
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">
                                Students
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">
                                Courses
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">
                                Reports
                            </a>
                        </li>
                    </ul>

                    <h6
                        class="sidebar-heading d-flex justify-content-between align-items-center px-3 mt-4 mb-1 text-muted text-uppercase">
                        <span>Settings</span>
                    </h6>
                    <ul class="nav flex-column mb-2">
                        <li class="nav-item">
                            <a class="nav-link" href="#">
                                Account
                            </a>
                        </li>
                    </ul>
                </div>
            </nav>

            <!-- Main Content -->
            <main class="flex-grow-1 px-4 py-4" style="min-width: 0;">
                <div
                    class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2">Dashboard</h1>
                </div>

                <!-- Form Card -->
                <div class="card shadow-sm border-0 bg-light">
                    <div class="card-header bg-primary text-white border-0">
                        <h5 class="mb-0">Student Registration Form</h5>
                    </div>
                    <div class="card-body p-4">
                        <form class="row g-3" method="POST">
                            {% csrf_token %}
                            <div class="col-12">
                                <label for="name" class="form-label fw-semibold">Name</label>
                                <input type="text" class="form-control" name="name" id="name" placeholder="Enter full name">
                            </div>

                            <div class="col-md-6">
                                <label for="phone" class="form-label fw-semibold">Phone Number</label>
                                <input type="text" class="form-control" name="phone" id="phone" placeholder="Enter phone number">
                            </div>

                            <div class="col-md-6">
                                <label for="roll" class="form-label fw-semibold">Roll Number</label>
                                <input type="number" class="form-control" name="roll" id="roll" placeholder="Enter roll number">
                            </div>

                            <div class="col-12 pt-3">
                                <button type="submit" class="btn btn-primary px-5 shadow-sm">Register Student</button>
                                <button type="reset"
                                    class="btn btn-outline-secondary ms-2 px-4 shadow-sm">Reset</button>
                            </div>
                        </form>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
